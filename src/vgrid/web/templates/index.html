<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vgrid 模拟盘看盘</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin: 0; padding: 20px; background: #f4f5f7; color: #222; }
  h1 { font-size: 20px; margin: 0 0 16px; }
  h1 small { font-weight: 400; color: #888; font-size: 13px; margin-left: 6px; }
  .cards { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .card { background: #fff; padding: 10px 14px; border-radius: 8px; min-width: 108px; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  .card .label { color: #888; font-size: 12px; }
  .card .value { font-size: 18px; font-weight: 600; margin-top: 2px; }
  .pos { color: #d9303a; }   /* A 股红 = 盈利 */
  .neg { color: #2e8b57; }   /* 绿 = 亏损 / 风险 */
  .panel { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  svg { display: block; width: 100%; height: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid #eee; }
  th { color: #888; font-weight: 600; }
  .empty { color: #aaa; text-align: center; padding: 30px; }
  .hint { color: #888; font-size: 12px; margin: 8px 0 0; }
  code { background: #eee; padding: 1px 5px; border-radius: 3px; }
</style>
</head>
<body>
<h1>vgrid 模拟盘 · <span id="symbol">-</span><small id="meta"></small></h1>
<div id="cards" class="cards"><div class="empty">加载中…</div></div>
<div class="panel"><svg id="chart" viewBox="0 0 800 280" preserveAspectRatio="none"></svg></div>
<div class="panel"><h3 style="margin:0 0 8px;font-size:15px;">成交明细（最近 30 笔）</h3><table id="fills"></table></div>
<p class="hint">每 5 秒自动刷新 · 夏普按日折算（tick 频率高时偏低，仅参考）</p>
<script>
const fmt = {
  pct: s => (Number(s) * 100).toFixed(2) + '%',
  money: s => Number(s).toFixed(2),
  num: (s, n = 2) => Number(s).toFixed(n),
};
function cls(v, flip = false) {
  const n = Number(v);
  if (flip) return n >= 0 ? 'neg' : 'pos';   // 回撤类：大 = 差 = 绿
  return n >= 0 ? 'pos' : 'neg';
}
async function refresh() {
  try {
    const r = await fetch('/api/state');
    if (r.status === 404) { document.getElementById('cards').innerHTML = '<div class="empty">库无数据 —— 先 <code>vgrid paper run</code></div>'; document.getElementById('chart').innerHTML=''; document.getElementById('fills').innerHTML=''; return; }
    render(await r.json());
  } catch (e) { console.error(e); }
}
function render(d) {
  document.getElementById('symbol').textContent = d.symbol;
  document.getElementById('meta').textContent = `${d.n_ticks} 个 tick · ${d.config.base_build_mode}/${d.config.spacing_mode} · 区间 ${d.config.lower_price}~${d.config.upper_price} ${d.config.grid_count}格`;
  const s = d.snapshot, m = d.metrics;
  const cards = [
    ['最新价', s.last_price ?? '-', ''],
    ['持仓格数', s.open_lots, ''],
    ['占用资金', fmt.money(s.committed), ''],
    ['已实现盈亏', fmt.money(s.realized_pnl), cls(s.realized_pnl)],
    ['手续费', fmt.money(s.total_fee), ''],
    ['总收益率', fmt.pct(m.total_return), cls(m.total_return)],
    ['最大回撤', fmt.pct(m.max_drawdown), cls(m.max_drawdown, true)],
    ['夏普*', fmt.num(m.sharpe), ''],
    ['买入持有', fmt.pct(m.buy_hold_return), cls(m.buy_hold_return)],
  ];
  document.getElementById('cards').innerHTML = cards.map(([l, v, c]) => `<div class="card"><div class="label">${l}</div><div class="value ${c}">${v}</div></div>`).join('');
  drawChart(d);
  drawFills(d.fills);
}
function drawChart(d) {
  const c = d.equity_curve;
  const svg = document.getElementById('chart');
  if (!c.length) { svg.innerHTML = '<text x="400" y="140" text-anchor="middle" fill="#aaa">无曲线</text>'; return; }
  const W = 800, H = 280, P = 34;
  const ys = c.map(p => Number(p.equity));
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const range = (maxY - minY) || 1;
  const sx = i => P + i / (c.length - 1) * (W - 2 * P);
  const sy = v => H - P - (v - minY) / range * (H - 2 * P);
  const path = c.map((p, i) => (i ? 'L' : 'M') + sx(i).toFixed(1) + ' ' + sy(Number(p.equity)).toFixed(1)).join(' ');
  const marks = d.fill_marks.map(mk => {
    const x = sx(mk.index), y = sy(Number(c[mk.index].equity));
    const color = mk.side === 'buy' ? '#2e8b57' : '#d9303a';
    const lbl = `${mk.side === 'buy' ? '买' : '卖'} @${mk.price} ×${mk.shares}${mk.realized_pnl ? ' pnl=' + mk.realized_pnl : ''}`;
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="${color}"><title>${lbl}</title></circle>`;
  }).join('');
  svg.innerHTML =
    `<line x1="${P}" y1="${H - P}" x2="${W - P}" y2="${H - P}" stroke="#ddd"/>` +
    `<line x1="${P}" y1="${P}" x2="${P}" y2="${H - P}" stroke="#ddd"/>` +
    `<text x="${P - 4}" y="${P + 4}" text-anchor="end" font-size="10" fill="#888">${maxY.toFixed(0)}</text>` +
    `<text x="${P - 4}" y="${H - P}" text-anchor="end" font-size="10" fill="#888">${minY.toFixed(0)}</text>` +
    `<path d="${path}" fill="none" stroke="#3b82f6" stroke-width="1.8"/>` + marks;
}
function drawFills(fills) {
  const el = document.getElementById('fills');
  if (!fills.length) { el.innerHTML = '<tr><td class="empty">无成交</td></tr>'; return; }
  const rows = fills.slice().reverse().slice(0, 30).map(f =>
    `<tr><td>${(f.ts || '').replace('T', ' ').slice(0, 16)}</td><td class="${f.side === 'buy' ? 'neg' : 'pos'}">${f.side === 'buy' ? '买' : '卖'}</td><td>${f.price}</td><td>${f.shares}</td><td>${f.fee}</td><td>${f.realized_pnl ?? '—'}</td></tr>`
  ).join('');
  el.innerHTML = '<tr><th>时间</th><th>方向</th><th>价格</th><th>份额</th><th>手续费</th><th>已实现盈亏</th></tr>' + rows;
}
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
